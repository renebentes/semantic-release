name: "рЯЩЛвАНвЩВпЄП Assign me"

on:
  issues:
    types: [opened, reopened]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  set_assignee:
    uses: renebentes/.github/.github/workflows/assign-me.yml@main
    permissions:
      issues: write
      pull-requests: write
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
